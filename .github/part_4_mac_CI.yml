name: JFreeChart MacOS CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialize JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Execute Maven Build
      run: mvn -batch-mode clean verify -Djava.awt.headless=true

    - name: Save JUnit Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-test-results
        path: target/surefire-reports/*.xml
