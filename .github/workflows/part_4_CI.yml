name: JFreeChart Part 4 CI

# Trigger this workflow on every push to the master branch
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        run: mvn --batch-mode clean verify -Djava.awt.headless=true

      - name: Upload Test Report
        if: always() # Run this even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: '**/target/surefire-reports/*.xml'